schema_version: "1.0"
dictionary_kind: "sister_language_disambiguation"
language_pair: ["zul", "xho"]
version: "0.1.0"
source:
  origin_authors: ["Poulos & Msimang (1998)", "Du Plessis & Visser (1992)", "Mesthrie (2002)"]
  origin_license: "Compiled from published reference grammars; YAML file licensed CC-BY-4.0"
review:
  last_reviewed_by: "PENDING_NATIVE_SPEAKER_REVIEW"
  last_reviewed_on: null
caveats: |
  This starter dictionary lists candidate features that published reference grammars
  describe for isiZulu and isiXhosa. Entries are unverified; treat them as ranked
  evidence, not authoritative labels. Multilingual urban speech often refuses neat
  single-language boundaries, and disagreement should be recorded.
distinctive_morphemes:
  - feature: "1sg subject concord"
    zul_form: "ngi-"
    xho_form: "ndi-"
    confidence: 0.95
    verified: false
    source_citation: "Poulos & Msimang (1998); Du Plessis & Visser (1992)"
    note: "Strong written cue when the subject concord is visible; still requires context review."
  - feature: "1sg negative sequence"
    zul_form: "angi-"
    xho_form: "andi-"
    confidence: 0.90
    verified: false
    source_citation: "Poulos & Msimang (1998); Du Plessis & Visser (1992)"
    note: "Useful only when tokenisation preserves the sequence."
  - feature: "shared negative present"
    zul_form: "a-...-i"
    xho_form: "a-...-i"
    confidence: 0.20
    verified: false
    source_citation: "Poulos & Msimang (1998); Du Plessis & Visser (1992)"
    note: "Shared pattern; not useful in isolation."
distinctive_lexemes:
  - meaning: "yes"
    forms: {zul: "yebo", xho: "ewe"}
    confidence: 0.75
    verified: false
    source_citation: "Poulos & Msimang (1998); Du Plessis & Visser (1992)"
    note: "Common teaching-example contrast; verify with local usage."
  - meaning: "person"
    forms: {zul: "umuntu", xho: "umntu"}
    confidence: 0.70
    verified: false
    source_citation: "Poulos & Msimang (1998); Du Plessis & Visser (1992)"
    note: "Orthographic vowel pattern can help, but cognacy remains close."
  - meaning: "greeting"
    forms: {zul: "sawubona", xho: "molo"}
    confidence: 0.65
    verified: false
    source_citation: "Poulos & Msimang (1998); Du Plessis & Visser (1992)"
    note: "Greetings circulate across repertoires."
  - meaning: "to speak/say"
    forms: {zul: "ukukhuluma", xho: "ukuthetha"}
    confidence: 0.65
    verified: false
    source_citation: "Poulos & Msimang (1998); Du Plessis & Visser (1992)"
    note: "Candidate lexeme pair from reference/teaching materials; verify before publication."
  - meaning: "today"
    forms: {zul: "namuhla", xho: "namhlanje"}
    confidence: 0.60
    verified: false
    source_citation: "Poulos & Msimang (1998); Du Plessis & Visser (1992)"
    note: "Dialect and register may affect forms."
  - meaning: "where"
    forms: {zul: "kuphi", xho: "phi"}
    confidence: 0.55
    verified: false
    source_citation: "Poulos & Msimang (1998); Du Plessis & Visser (1992)"
    note: "Short forms are fragile as token-level evidence."
orthographic_features:
  - code: "xho_nd_initial"
    languages: ["xho"]
    description: "Initial ndi-/ndiya- sequences may indicate isiXhosa first-person forms."
    confidence: 0.75
    verified: false
    source_citation: "Du Plessis & Visser (1992)"
    note: "Advisory string cue only."
  - code: "click_letters_c_q_x"
    languages: ["zul", "xho"]
    description: "Both orthographies use c/q/x for clicks; higher density may be suggestive of isiXhosa in some corpora."
    confidence: 0.30
    verified: false
    source_citation: "Mesthrie (2002)"
    note: "Statistical and project-tunable, never decisive."
phonotactic_features:
  - code: "nguni_shared_open_syllables"
    languages: ["zul", "xho"]
    description: "Shared Nguni phonotactic patterns limit token-level certainty."
    confidence: 0.0
    verified: false
    note: "Confidence-lowering caution."
confidence_thresholds:
  high: 0.80
  medium: 0.50
  low: 0.20
  ambiguous_below: 0.65
  default_evidence_required: "at least one feature ≥ 0.70 OR at least two features ≥ 0.50"
