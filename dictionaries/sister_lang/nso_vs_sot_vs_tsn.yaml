caveats: |
  This three-way starter dictionary is deliberately conservative. Northern
  Sotho/Sepedi, Sesotho, and Setswana share substantial Sotho-Tswana
  grammatical material, and their political and orthographic histories do not
  reduce cleanly to token-level cues. Entries here are unverified suggestions
  for researcher review, not declarations of language identity.
distinctive_morphemes:
