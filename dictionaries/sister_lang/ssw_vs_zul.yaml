schema_version: "1.0"
dictionary_kind: "sister_language_disambiguation"
language_pair: ["ssw", "zul"]
version: "0.1.0"
source:
  origin_authors: ["Ziervogel & Mabuza (1976)", "Poulos & Msimang (1998)", "SADiLaR Siswati resources"]
  origin_license: "Compiled from published reference grammars and resource metadata; YAML file licensed CC-BY-4.0"
review:
  last_reviewed_by: "PENDING_NATIVE_SPEAKER_REVIEW"
  last_reviewed_on: null
caveats: |
  siSwati and isiZulu have substantial Nguni overlap. This file is intentionally
  conservative and heavily unverified. It should be used only to surface evidence
  for human review, never to declare a speaker or utterance identity.
distinctive_morphemes:
