    ssw_form: "ngi-"
    zul_form: "ngi-"
    confidence: 0.10
    verified: false
    source_citation: "Ziervogel & Mabuza (1976); Poulos & Msimang (1998)"
    note: "Shared Nguni form; included to prevent false distinctiveness."
  - feature: "candidate siSwati palatal/affricate written cue"
    ssw_form: "dv"
    zul_form: null
    confidence: 0.45
    verified: false
    source_citation: "Ziervogel & Mabuza (1976)"
    note: "Orthographic cue only; verify with a siSwati speaker and a current grammar."
distinctive_lexemes:
  - meaning: "yes"
    forms: {ssw: "yebo", zul: "yebo"}
    confidence: 0.05
    verified: false
    source_citation: "Ziervogel & Mabuza (1976); Poulos & Msimang (1998)"
    note: "Shared response; not distinctive."
  - meaning: "person"
    forms: {ssw: "umuntfu", zul: "umuntu"}
    confidence: 0.60
    verified: false
    source_citation: "Ziervogel & Mabuza (1976); Poulos & Msimang (1998)"
    note: "Candidate spelling contrast; awaiting native-speaker review."
  - meaning: "to see"
    forms: {ssw: "kubona", zul: "ukubona"}
