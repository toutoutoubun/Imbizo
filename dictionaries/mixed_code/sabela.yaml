variety_code: "sabela"
variety_name: "Sabela"
version: "0.1.0"
source: "Van Onselen (1984); Ravyse (2021); Saville & McKinney (2017)"
last_reviewed_by: "PENDING_HUMAN_REVIEW"
last_reviewed_on: "YYYY-MM-DD"
social_context: >
  Sabela is treated here as a sensitive prison-linked communicative repertoire
  associated in available literature with secrecy, institutional power,
  coercion, gang contexts, and later circulation outside prisons. Researchers
  should approach it through ethics review, participant consent, and community
  expertise.
caveats: >
  This starter profile is intentionally sparse and heavily unverified. It does
  not teach Sabela, celebrate prison gangs, identify speakers, or imply that a
  form is criminal. Public descriptions of Sabela are uneven and can be
  sensationalized. Use this file only to support careful annotation where a
  researcher already has ethical clearance and contextual knowledge. Local
  review is required before any entry is treated as evidence.
