  - id: za_lex
    name: ZA_LEX lexical pronunciation resources
    resource_kind: toolkit
    origin: ttslab / NWU, Daniel van Niekerk
    url: https://github.com/ttslab/za_lex/archive/refs/heads/master.tar.gz
    format: tar
    license: Apache-2.0 / MIT scripts; per-language LICENCE files for data
    licence_classification:
      spdx_id: Apache-2.0-OR-MIT
      tier: 1
      fosl_compatible: true
      combinable_with_agpl: combination
      commercial_use_restricted: false
      sharealike_required: false
      downstream_obligations:
        - attribution
        - preserve_per_language_licence_files
      redistribution_notice: >
        ZA_LEX scripts are Tier-1 permissive resources, but each language data
        directory must preserve its upstream LICENCE file. Imbizo-CS mirrors only
        directories whose licence file is present so researchers can audit
        phonological evidence later.
    license_check_required: true
    expected_sha256: null
    bundle_status: shippable
    adapter: tools/adapters/za_lex.py
    output_dirs:
      - processing/za_lex
    origin_authors:
      - Daniel van Niekerk
      - ttslab
    notes: >
      Bootstrap mirrors per-language data only when each language directory
      preserves its upstream LICENCE file.

  - id: whisper_cpp_optional
    name: whisper.cpp optional local ASR plug-in source
    resource_kind: toolkit
    origin: ggml-org / Georgi Gerganov
    url: https://github.com/ggml-org/whisper.cpp/archive/refs/tags/v1.7.6.tar.gz
    format: tar
    license: MIT
    licence_classification:
      spdx_id: MIT
      tier: 1
      fosl_compatible: true
      combinable_with_agpl: combination
      commercial_use_restricted: false
      sharealike_required: false
      downstream_obligations:
        - attribution
        - preserve_mit_notice
      redistribution_notice: >
        whisper.cpp source is MIT licensed and compatible as Tier-1 source code,
        but Imbizo-CS never enables ASR by default. Model files remain pending
        licence verification and require a separate explicit acceptance path.
    license_check_required: false
    expected_sha256: null
    bundle_status: shippable
    opt_in_flag: include_asr
    adapter: tools/adapters/whisper_cpp.py
    output_dirs:
      - processing/whisper_cpp
      - models/asr
    origin_authors:
      - Georgi Gerganov
      - ggml-org
    notes: >
      Strictly opt-in. Requires --include-asr and IMBIZO_ASR_ACCEPTED=1.
      Writes a quality disclaimer and never becomes an MVP default. Whisper.cpp
      models are deferred until their redistribution terms are pinned per model.

