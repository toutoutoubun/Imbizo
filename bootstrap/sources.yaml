    license_check_required: false
    expected_sha256: null
    bundle_status: shippable
    adapter: tools/adapters/masakhapos.py
    output_dirs:
      - corpora/masakhapos
    origin_authors:
      - Dione et al.
      - Masakhane community
    notes: Dione et al. 2023. Dataset is non-commercial; code licensing is separate.

