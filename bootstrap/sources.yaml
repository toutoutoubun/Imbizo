      commercial_use_restricted: true
      sharealike_required: false
      downstream_obligations:
        - attribution
        - non_commercial
      redistribution_notice: >
        MasakhaPOS is licensed CC-BY-NC-4.0 by the Masakhane community. Imbizo-CS
        treats it as an Optional-NC resource: it may support local POS analysis
        and 4-M auxiliary tagging, but any redistributed dataset or annotation
