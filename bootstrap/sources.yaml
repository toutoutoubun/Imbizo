# Master manifest for Imbizo-CS dictionary and processing-resource bootstrap.
# expected_sha256 is null until the first audited retrieval. Production
# releases should pin every checksum after the first human license audit.
manifest_version: "1.1"
default_tier: 1
distribution_policy:
  tier_1: "always installed; default offline-after-bootstrap state"
  tier_2: "opt-in only; requires --include-nc-data flag and IMBIZO_NC_ACCEPTED=1"
  tier_3: "community-curated; not auto-downloaded; transferred via USB review packets only"

sources:
  - id: up_multilingual_lexicons
    name: South African multilingual lexicons
    resource_kind: dictionary
    origin: University of Pretoria, ABSA Chair for Data Science
    url: https://researchdata.up.ac.za/articles/dataset/South_African_multilingual_lexicons/27002596
    format: json
    license: CC-BY-4.0
    licence_classification:
      spdx_id: CC-BY-4.0
      tier: 1
      fosl_compatible: true
      combinable_with_agpl: combination
      commercial_use_restricted: false
      sharealike_required: false
      downstream_obligations:
        - attribution
      redistribution_notice: >
        UP Multilingual Lexicons are treated as Tier-1 resources under
        CC-BY-4.0. Outputs should cite the source and retain attribution, but
        the resource does not add a non-commercial restriction to Imbizo-CS
        reports or exported project data.
    license_probe_url: https://researchdata.up.ac.za/articles/dataset/South_African_multilingual_lexicons/27002596
    license_markers:
      - CC-BY-4.0
      - CC BY 4.0
      - Creative Commons Attribution 4.0
    license_check_required: true
    expected_sha256: null
    bundle_status: shippable
    adapter: tools/adapters/up_lexicons.py
    output_dirs:
      - dictionaries/imported/base_lexicon
    origin_authors:
      - University of Pretoria ABSA Chair for Data Science
    notes: >
      Bootstrap must confirm the source page metadata declares CC-BY-4.0 before
      release use. The manifest URL is canonical; deployments may provide a
      direct JSON file in an audited bundle.

  - id: mafoko
    name: Mafoko / za-mavito terminology collections
    resource_kind: dictionary
    origin: Data Science for Social Impact, University of Pretoria
    url:
      - https://raw.githubusercontent.com/dsfsi/za-mavito/main/data/dsac/combined/combined_dsac.csv
      - https://raw.githubusercontent.com/dsfsi/za-mavito/main/data/statssa/statssa_multilingual_statistical_terminology.csv
      - https://raw.githubusercontent.com/dsfsi/za-mavito/main/data/unisa_multilingual/unisa_multilingual_linguistic_terminology.csv
      - https://raw.githubusercontent.com/dsfsi/za-mavito/main/data/up_glossary/up_multilingual_academic_glossaries.csv
    format: csv
    license: Nwulite Obodo Open Data License 1.0 OR CC-BY-NC-SA 2.5 ZA
    licence_classification:
      spdx_id: MIXED-NOODL-1.0-OR-CC-BY-NC-SA-2.5-ZA
      tier: 3
      fosl_compatible: false
      combinable_with_agpl: aggregation_only
      commercial_use_restricted: true
      sharealike_required: true
      downstream_obligations:
        - attribution
        - non_commercial_when_marked
        - sharealike_when_marked
        - community_acknowledgement
      redistribution_notice: >
        Mafoko contains terminology assembled under mixed data licences,
        including the Nwulite Obodo Open Data License and CC-BY-NC-SA-2.5 ZA
        entries. Imbizo-CS treats Mafoko as a Tier-3 community-governed source
        unless a release audit separates individual Tier-1 rows. CC-BY-NC-SA
        rows restrict commercial reuse and require ShareAlike attribution when
        redistributed. NOODL rows require explicit acknowledgement of the data
        sovereignty terms under which they were shared. Do not redistribute
        Mafoko-derived overlays without preserving the per-entry licence and
        consulting the project governance notes in PRINCIPLES.md.
    license_check_required: true
    expected_sha256: null
    bundle_status: shippable
    adapter: tools/adapters/mafoko.py
    output_dirs:
      - dictionaries/imported/triggers
      - dictionaries/imported/glossaries
    origin_authors:
      - Data Science for Social Impact
      - University of Pretoria
    notes: >
      The adapter preserves the per-file license string passed from audited
      repository metadata. NOODL-licensed subsets are community-tier resources
      and should normally travel through review packets rather than automatic
      bootstrap.

  - id: african_wordnet
    name: African Wordnet open-license subset
    resource_kind: dictionary
    origin: UNISA SADiLaR node, African Wordnet project
    url: https://repo.sadilar.org/
    format: xml
    license: CC-BY-4.0 when declared in SADiLaR metadata
    licence_classification:
      spdx_id: CC-BY-4.0
      tier: 1
      fosl_compatible: true
      combinable_with_agpl: combination
      commercial_use_restricted: false
      sharealike_required: false
      downstream_obligations:
        - attribution
      redistribution_notice: >
        African Wordnet files are included only when the SADiLaR metadata
        declares a Tier-1 open licence such as CC-BY-4.0. Converted semantic
        domain files retain attribution and provenance metadata.
    license_check_required: true
    expected_sha256: null
    bundle_status: shippable
    adapter: tools/adapters/african_wordnet.py
    output_dirs:
      - dictionaries/imported/semantic_domains
    origin_authors:
      - African Wordnet Project
      - UNISA SADiLaR node
    notes: >
      Only XML files whose metadata declares a Tier-1 allowed license are
      converted. CC-BY-NC files should be handled as Tier-2 overlays only after
      explicit opt-in.

  - id: unisa_termbank
    name: UNISA Multilingual Linguistic Terminology
    resource_kind: dictionary
    origin: SADiLaR / UNISA node Lexonomy export
    url: https://repo.sadilar.org/
    format: xml
    license: PER-FILE-SADILAR-METADATA
    license_resolution: per_file_metadata
    licence_classification:
      spdx_id: PER-FILE-SADILAR-METADATA
      tier: 1
      fosl_compatible: true
      combinable_with_agpl: combination
      commercial_use_restricted: false
      sharealike_required: false
      downstream_obligations:
        - per_file_rights_verification
        - attribution_when_declared
      redistribution_notice: >
        UNISA / SADiLaR terminology exports are not treated as having a single
        blanket licence. The adapter reads each XML file's own rights metadata
        and converts only files whose metadata resolves to the Tier-1 allow-list,
        currently CC-BY-4.0 for this source. Missing, unclear, generic OER,
        NonCommercial, or otherwise incompatible rights statements are skipped
        rather than silently bundled.
    license_check_required: true
    expected_sha256: null
    bundle_status: shippable
    adapter: tools/adapters/unisa_termbank.py
    output_dirs:
      - dictionaries/imported/glossaries
    origin_authors:
      - UNISA SADiLaR node
    notes: >
      Do not assume a blanket OER licence. Release bundles must preserve the
      audited XML rights metadata. Converted YAML files carry the actual
      per-file licence classification used by the adapter.

  - id: exdn
    name: English-Xhosa Dictionary for Nurses
    resource_kind: dictionary
    origin: MacVicar (1935), linked-data conversion by Klein et al. (2018)
    url: https://github.com/linked-dictionaries/exdn
    format: rdf-turtle
    license: Public-Domain
    licence_classification:
      spdx_id: Public-Domain
      tier: 1
      fosl_compatible: true
      combinable_with_agpl: combination
      commercial_use_restricted: false
      sharealike_required: false
      downstream_obligations:
        - citation_requested
      redistribution_notice: >
        EXDN is treated as a Tier-1 public-domain historical source. Imbizo-CS
        still asks researchers to cite MacVicar (1935) and the linked-data
        conversion because provenance matters even when copyright restrictions
        no longer apply.
    license_check_required: false
    expected_sha256: null
    bundle_status: shippable
    adapter: tools/adapters/exdn.py
    output_dirs:
      - dictionaries/imported/triggers
    origin_authors:
      - MacVicar
      - Klein et al.
    notes: >
      Public-domain historical medical dictionary. Orthography may differ from
      modern isiXhosa standards; every entry remains unverified.

  # Pin this model checksum after the first audited retrieval. The compressed
  # .ftz is intentionally Tier 2 because CC-BY-SA-3.0 is aggregation-only with
  # AGPLv3 according to Creative Commons compatibility guidance.
  - id: fasttext_lid176_ftz
    name: fastText lid.176 compressed language ID model
    resource_kind: model
    origin: Facebook AI Research
    url: https://dl.fbaipublicfiles.com/fasttext/supervised-models/lid.176.ftz
    format: fasttext-binary
    license: CC-BY-SA-3.0
    licence_classification:
      spdx_id: CC-BY-SA-3.0
      tier: 2
      fosl_compatible: false
      combinable_with_agpl: aggregation_only
      commercial_use_restricted: false
      sharealike_required: true
      downstream_obligations:
        - attribution
        - sharealike
      redistribution_notice: >
        The fastText lid.176 model file is licensed CC-BY-SA-3.0 by Facebook AI
        Research and is included in Imbizo-CS only as an aggregated model file,
        not as AGPL-derived source code. Imbizo-CS uses it for inference during
        local language identification. If you redistribute the model file or a
        model adapted from it, you must preserve attribution and comply with the
        ShareAlike terms for that model-derived artifact. Researchers who use
        the installed model locally and do not redistribute the model itself are
        generally unaffected, but reports should still record that language-ID
        suggestions used a CC-BY-SA resource.
    license_check_required: false
    expected_sha256: null
    bundle_status: shippable
    adapter: tools/adapters/fasttext_lid.py
    output_dirs:
      - models/lid
    origin_authors:
      - Facebook AI Research
      - Joulin et al.
    notes: Joulin et al. 2017. Optional lightweight LID for Layer 1 of F4.

  - id: fasttext_lid176_bin_optional
    name: fastText lid.176 full language ID model
    resource_kind: model
    origin: Facebook AI Research
    url: https://dl.fbaipublicfiles.com/fasttext/supervised-models/lid.176.bin
    format: fasttext-binary
    license: CC-BY-SA-3.0
    licence_classification:
      spdx_id: CC-BY-SA-3.0
      tier: 2
      fosl_compatible: false
      combinable_with_agpl: aggregation_only
      commercial_use_restricted: false
      sharealike_required: true
      downstream_obligations:
        - attribution
        - sharealike
      redistribution_notice: >
        The full fastText lid.176 model carries the same CC-BY-SA-3.0
        aggregation-only obligations as the compressed model, with a much larger
        storage footprint. It is excluded from default bundles unless a release
        manager explicitly chooses it and records the checksum.
    license_check_required: false
    expected_sha256: null
    bundle_status: pending_license_verification
    adapter: tools/adapters/fasttext_lid.py
    output_dirs:
      - models/lid
    origin_authors:
      - Facebook AI Research
      - Joulin et al.
    notes: Optional full model; excluded from default shippable bundle because of size.

